name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            output_name: transfert
            artifact_name: Transfert-linux
          - os: windows-latest
            output_name: transfert.exe
            artifact_name: Transfert-windows
          - os: macos-latest
            output_name: transfert
            artifact_name: Transfert-macos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk xvfb

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install python-tk

      - name: Install Python packages
        run: |
          pip install pyinstaller

      - name: Build on Linux
        if: runner.os == 'Linux'
        run: |
          pyinstaller --onefile --windowed --name transfert src/transfert.py

      - name: Build on Windows
        if: runner.os == 'Windows'
        run: |
          pyinstaller --onefile --windowed --name transfert.exe src/transfert.py

      - name: Build on macOS
        if: runner.os == 'macOS'
        run: |
          pyinstaller --onefile --windowed --name transfert src/transfert.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.output_name }}

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/${{ matrix.output_name }}
          generate_release_notes: true
